# Build and publish fresh bootstrap compiler binaries.
# build-linux  → x86_64-linux  (ubuntu-latest)
# build-macos  → aarch64-macos (macos-14, Apple Silicon)
name: build-bootstrap

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Bootstrap release tag (e.g. bootstrap-sig-v3)'
        required: false
        default: 'bootstrap-sig-v3'

permissions:
  contents: write

env:
  VERSION: ${{ github.event.inputs.version || 'bootstrap-sig-v3' }}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache zig-cache
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-cache-bootstrap-linux-${{ github.sha }}
          restore-keys: zig-cache-bootstrap-linux-

      - name: Download latest x86_64-linux sig release
        run: |
          DOWNLOAD_URL=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases" \
            | python3 -c "
          import sys, json
          for r in json.load(sys.stdin):
            if not isinstance(r, dict): continue
            for a in r.get('assets', []):
              n = a['name']
              if 'x86_64-linux' in n and n.endswith('.tar.xz') and 'bootstrap' not in n:
                print(a['browser_download_url'])
                exit(0)
          exit(1)
          ")
          echo "Bootstrap: $DOWNLOAD_URL"
          mkdir -p /tmp/bootstrap-sig
          curl -fsSL "$DOWNLOAD_URL" -o /tmp/bootstrap.tar.xz
          tar -xJf /tmp/bootstrap.tar.xz -C /tmp/bootstrap-sig
          SIG=$(find /tmp/bootstrap-sig -name "sig" -not -type d | head -1)
          chmod +x "$SIG"
          SIG_DIR=$(dirname "$SIG")
          echo "$SIG_DIR" >> "$GITHUB_PATH"
          "$SIG" version
          echo "ZIG_LIB_DIR=$(pwd)/lib" >> "$GITHUB_ENV"

      - name: Build x86_64-linux
        run: |
          sig build \
            --zig-lib-dir "$ZIG_LIB_DIR" \
            -Dtarget=x86_64-linux-musl \
            -Doptimize=ReleaseSafe \
            -Dno-lib \
            -Dno-langref \
            -Dskip-tests \
            --prefix bootstrap-sig-x86_64-linux
        timeout-minutes: 120

      - name: Verify and package
        run: |
          file bootstrap-sig-x86_64-linux/bin/sig
          tar -czf bootstrap-sig-x86_64-linux.tar.gz -C bootstrap-sig-x86_64-linux .

      - name: Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${VERSION}" >/dev/null 2>&1 || \
            gh release create "${VERSION}" \
              --title "Bootstrap Sig Compiler ${VERSION}" \
              --notes "Bootstrap compiler binaries — sig builds sig, no zig required." \
              --prerelease
          gh release upload "${VERSION}" bootstrap-sig-x86_64-linux.tar.gz --clobber

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache zig-cache
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-cache-bootstrap-macos-${{ github.sha }}
          restore-keys: zig-cache-bootstrap-macos-

      - name: Download latest aarch64-macos sig release
        run: |
          DOWNLOAD_URL=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases" \
            | python3 -c "
          import sys, json
          for r in json.load(sys.stdin):
            if not isinstance(r, dict): continue
            for a in r.get('assets', []):
              n = a['name']
              if 'aarch64-macos' in n and n.endswith('.tar.xz') and 'bootstrap' not in n:
                print(a['browser_download_url'])
                exit(0)
          exit(1)
          ")
          echo "Bootstrap: $DOWNLOAD_URL"
          mkdir -p /tmp/bootstrap-sig
          curl -fsSL "$DOWNLOAD_URL" -o /tmp/bootstrap.tar.xz
          tar -xJf /tmp/bootstrap.tar.xz -C /tmp/bootstrap-sig
          SIG=$(find /tmp/bootstrap-sig -name "sig" -not -type d | head -1)
          chmod +x "$SIG"
          "$SIG" version
          echo "SIG_BIN=$SIG" >> "$GITHUB_ENV"
          echo "ZIG_LIB_DIR=$(pwd)/lib" >> "$GITHUB_ENV"

      - name: Build aarch64-macos
        run: |
          "$SIG_BIN" build \
            --zig-lib-dir "$ZIG_LIB_DIR" \
            -Dtarget=aarch64-macos \
            -Doptimize=ReleaseSafe \
            -Dno-lib \
            -Dno-langref \
            -Dskip-tests \
            --prefix bootstrap-sig-aarch64-macos
        timeout-minutes: 120

      - name: Verify and package
        run: |
          file bootstrap-sig-aarch64-macos/bin/sig
          bootstrap-sig-aarch64-macos/bin/sig version
          tar -czf bootstrap-sig-aarch64-macos.tar.gz -C bootstrap-sig-aarch64-macos .

      - name: Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${VERSION}" >/dev/null 2>&1 || \
            gh release create "${VERSION}" \
              --title "Bootstrap Sig Compiler ${VERSION}" \
              --notes "Bootstrap compiler binaries — sig builds sig, no zig required." \
              --prerelease
          gh release upload "${VERSION}" bootstrap-sig-aarch64-macos.tar.gz --clobber
