# Build and publish fresh bootstrap compiler binaries.
# Two jobs run in parallel:
#   build-linux  → x86_64-linux (native, ubuntu-latest)
#   build-macos  → aarch64-macos (native, macos-latest)
# Both upload to the same release tag.
name: build-bootstrap

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Bootstrap release tag (e.g. bootstrap-sig-v3)'
        required: false
        default: 'bootstrap-sig-v2'

permissions:
  contents: write

env:
  VERSION: ${{ github.event.inputs.version || 'bootstrap-sig-v2' }}

jobs:
  # ── Linux: build x86_64-linux natively ──────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    env:
      BOOTSTRAP_URL: https://github.com/SB0LTD/sig/releases/download/bootstrap-sig-v2/bootstrap-sig-x86_64-linux.tar.gz
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache zig-cache
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-cache-bootstrap-linux-${{ github.sha }}
          restore-keys: zig-cache-bootstrap-linux-

      - name: Download bootstrap sig (x86_64-linux)
        run: |
          mkdir -p /tmp/bootstrap-sig
          curl -fsSL "$BOOTSTRAP_URL" -o /tmp/bootstrap-sig.tar
          tar -xf /tmp/bootstrap-sig.tar -C /tmp/bootstrap-sig
          chmod +x /tmp/bootstrap-sig/bin/sig
          echo "/tmp/bootstrap-sig/bin" >> "$GITHUB_PATH"
          /tmp/bootstrap-sig/bin/sig version
          echo "ZIG_LIB_DIR=$(pwd)/lib" >> "$GITHUB_ENV"

      - name: Generate build_options.zig
        run: |
          mkdir -p .zig-cache
          # Resolve version string from build.sig
          SIG_VER=$(grep -oE 'sig_version_string = "[^"]+"' build.sig | grep -oE '"[^"]+"' | tr -d '"')
          ZIG_VER="${{ env.ZIG_VER }}"
          GIT_SHORT=$(git rev-parse --short=7 HEAD)
          VERSION_STR="${SIG_VER}+zig0.16.0.${GIT_SHORT}"
          cat > .zig-cache/build_options.zig <<EOF
          pub const mem_leak_frames: u32 = 0;
          pub const skip_non_native: bool = false;
          pub const have_llvm: bool = false;
          pub const llvm_has_m68k: bool = false;
          pub const llvm_has_csky: bool = false;
          pub const llvm_has_arc: bool = false;
          pub const llvm_has_xtensa: bool = false;
          pub const debug_gpa: bool = false;
          pub const version: [:0]const u8 = "${VERSION_STR}";
          pub const sig_version: [:0]const u8 = "${SIG_VER}";
          pub const semver: @import("std").SemanticVersion = .{ .major = 0, .minor = 1, .patch = 0, .pre = "dev", .build = "" };
          pub const enable_debug_extensions: bool = false;
          pub const enable_logging: bool = false;
          pub const enable_link_snapshots: bool = false;
          pub const enable_tracy: bool = false;
          pub const enable_tracy_callstack: bool = false;
          pub const enable_tracy_allocation: bool = false;
          pub const tracy_callstack_depth: u32 = 10;
          pub const value_tracing: bool = false;
          pub const @"src.dev.Env" = enum (u4) { bootstrap = 0, core = 1, full = 2, c_source = 3, ast_gen = 4, sema = 5, @"aarch64-linux" = 6, cbe = 7, @"powerpc-linux" = 8, @"riscv64-linux" = 9, spirv = 10, wasm = 11, @"x86_64-linux" = 12 };
          pub const dev: @"src.dev.Env" = .full;
          pub const @"build.IoMode" = enum (u1) { threaded = 0, evented = 1 };
          pub const io_mode: @"build.IoMode" = .threaded;
          pub const @"build.ValueInterpretMode" = enum (u1) { direct = 0, by_name = 1 };
          pub const value_interpret_mode: @"build.ValueInterpretMode" = .direct;
          EOF

      - name: Build x86_64-linux
        run: |
          mkdir -p bootstrap-sig-x86_64-linux/bin
          sig build-exe \
            -Mroot=src/main.zig \
            -Mbuild_options=.zig-cache/build_options.zig \
            --zig-lib-dir "$ZIG_LIB_DIR" \
            --cache-dir .zig-cache \
            --global-cache-dir .zig-cache \
            -target x86_64-linux-musl \
            -O ReleaseSafe \
            -femit-bin=bootstrap-sig-x86_64-linux/bin/sig
        timeout-minutes: 60

      - name: Verify and package
        run: |
          file bootstrap-sig-x86_64-linux/bin/sig
          tar -czf bootstrap-sig-x86_64-linux.tar.gz -C bootstrap-sig-x86_64-linux .

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${VERSION}" >/dev/null 2>&1 || \
            gh release create "${VERSION}" \
              --title "Bootstrap Sig Compiler ${VERSION}" \
              --notes "Bootstrap compiler binaries — sig builds sig, no zig required." \
              --prerelease

      - name: Upload x86_64-linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${VERSION}" bootstrap-sig-x86_64-linux.tar.gz --clobber

  # ── macOS: build aarch64-macos natively ─────────────────────────────────
  # Bootstrap source: the most recent aarch64-macos release binary.
  # These were produced by the release.yaml pipeline (which used zig once).
  # From here on, sig builds sig — no zig needed.
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache zig-cache
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-cache-bootstrap-macos-${{ github.sha }}
          restore-keys: zig-cache-bootstrap-macos-

      - name: Find and download latest aarch64-macos sig release binary
        run: |
          # Walk releases newest-first, grab the first aarch64-macos .tar.xz asset
          DOWNLOAD_URL=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases" \
            | python3 -c "
          import sys, json
          for r in json.load(sys.stdin):
              for a in r.get('assets', []):
                  n = a['name']
                  if 'aarch64-macos' in n and n.endswith('.tar.xz'):
                      print(a['browser_download_url'])
                      exit(0)
          exit(1)
          ")
          echo "Bootstrap URL: $DOWNLOAD_URL"
          mkdir -p /tmp/sig-bootstrap
          curl -fsSL "$DOWNLOAD_URL" -o /tmp/sig-bootstrap.tar.xz
          tar -xJf /tmp/sig-bootstrap.tar.xz -C /tmp/sig-bootstrap
          SIG=$(find /tmp/sig-bootstrap -name "sig" -not -type d | head -1)
          chmod +x "$SIG"
          "$SIG" version
          echo "SIG_BIN=$SIG" >> "$GITHUB_ENV"
          echo "ZIG_LIB_DIR=$(pwd)/lib" >> "$GITHUB_ENV"

      - name: Generate build_options.zig
        run: |
          mkdir -p .zig-cache
          SIG_VER=$(grep -oE 'sig_version_string = "[^"]+"' build.sig | grep -oE '"[^"]+"' | tr -d '"')
          GIT_SHORT=$(git rev-parse --short=7 HEAD)
          VERSION_STR="${SIG_VER}+zig0.16.0.${GIT_SHORT}"
          cat > .zig-cache/build_options.zig <<EOF
          pub const mem_leak_frames: u32 = 0;
          pub const skip_non_native: bool = false;
          pub const have_llvm: bool = false;
          pub const llvm_has_m68k: bool = false;
          pub const llvm_has_csky: bool = false;
          pub const llvm_has_arc: bool = false;
          pub const llvm_has_xtensa: bool = false;
          pub const debug_gpa: bool = false;
          pub const version: [:0]const u8 = "${VERSION_STR}";
          pub const sig_version: [:0]const u8 = "${SIG_VER}";
          pub const semver: @import("std").SemanticVersion = .{ .major = 0, .minor = 1, .patch = 0, .pre = "dev", .build = "" };
          pub const enable_debug_extensions: bool = false;
          pub const enable_logging: bool = false;
          pub const enable_link_snapshots: bool = false;
          pub const enable_tracy: bool = false;
          pub const enable_tracy_callstack: bool = false;
          pub const enable_tracy_allocation: bool = false;
          pub const tracy_callstack_depth: u32 = 10;
          pub const value_tracing: bool = false;
          pub const @"src.dev.Env" = enum (u4) { bootstrap = 0, core = 1, full = 2, c_source = 3, ast_gen = 4, sema = 5, @"aarch64-linux" = 6, cbe = 7, @"powerpc-linux" = 8, @"riscv64-linux" = 9, spirv = 10, wasm = 11, @"x86_64-linux" = 12 };
          pub const dev: @"src.dev.Env" = .full;
          pub const @"build.IoMode" = enum (u1) { threaded = 0, evented = 1 };
          pub const io_mode: @"build.IoMode" = .threaded;
          pub const @"build.ValueInterpretMode" = enum (u1) { direct = 0, by_name = 1 };
          pub const value_interpret_mode: @"build.ValueInterpretMode" = .direct;
          EOF

      - name: Build aarch64-macos bootstrap
        run: |
          mkdir -p bootstrap-sig-aarch64-macos/bin
          "$SIG_BIN" build-exe \
            -Mroot=src/main.zig \
            -Mbuild_options=.zig-cache/build_options.zig \
            --zig-lib-dir "$ZIG_LIB_DIR" \
            --cache-dir .zig-cache \
            --global-cache-dir .zig-cache \
            -target aarch64-macos \
            -O ReleaseSafe \
            -femit-bin=bootstrap-sig-aarch64-macos/bin/sig
        timeout-minutes: 60

      - name: Verify and package
        run: |
          file bootstrap-sig-aarch64-macos/bin/sig
          bootstrap-sig-aarch64-macos/bin/sig version
          tar -czf bootstrap-sig-aarch64-macos.tar.gz -C bootstrap-sig-aarch64-macos .

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${VERSION}" >/dev/null 2>&1 || \
            gh release create "${VERSION}" \
              --title "Bootstrap Sig Compiler ${VERSION}" \
              --notes "Bootstrap compiler binaries — sig builds sig, no zig required." \
              --prerelease

      - name: Upload aarch64-macos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${VERSION}" bootstrap-sig-aarch64-macos.tar.gz --clobber
